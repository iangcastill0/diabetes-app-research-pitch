apiVersion: v1
kind: Namespace
metadata:
  name: betterblood
e:
  - name: NODE_ENV
    value: "production"
  - name: AUTH_SERVICE_URL
    value: "auth-service"
  - name: CGM_SERVICE_URL
    value: "cgm-service"
  - name: FOOD_SERVICE_URL
    value: "food-service"
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: betterblood-secrets
        key: jwt-secret
  - name: DB_HOST
    valueFrom:
      secretKeyRef:
        name: betterblood-secrets
        key: db-host
  - name: DB_NAME
    value: "betterblood"
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: betterblood-secrets
        key: db-user
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: betterblood-secrets
        key: db-password
  - name: REDIS_HOST
    valueFrom:
      secretKeyRef:
        name: betterblood-secrets
        key: redis-host
  - name: REDIS_PORT
    value: "6379"
  volumeMounts:
  - name: tmp
    mountPath: /tmp
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
volumes:
- name: tmp
  emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: betterblood
spec:
  selector:
    app: auth-service
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cgm-service
  namespace: betterblood
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cgm-service
  template:
    metadata:
      labels:
        app: cgm-service
    spec:
      containers:
      - name: cgm-service
        image: betterblood/cgm-service:latest
        ports:
        - containerPort: 3002
          name: http
        - containerPort: 3003
          name: websocket
        env:
        - name: PORT
          value: "3002"
        - name: WS_PORT
          value: "3003"
        - name: NODE_ENV
          value: "production"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: betterblood-secrets
              key: db-host
        - name: DB_NAME
          value: "betterblood"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: betterblood-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: betterblood-secrets
              key: db-password
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: betterblood-secrets
              key: redis-host
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: cgm-service
  namespace: betterblood
spec:
  selector:
    app: cgm-service
  ports:
  - port: 3002
    targetPort: 3002
    name: http
  - port: 3003
    targetPort: 3003
    name: websocket
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-service
  namespace: betterblood
spec:
  replicas: 2
  selector:
    matchLabels:
      app: food-service
  template:
    metadata:
      labels:
        app: food-service
    spec:
      containers:
      - name: food-service
        image: betterblood/food-service:latest
        ports:
        - containerPort: 3004
          name: http
        env:
        - name: PORT
          value: "3004"
        - name: NODE_ENV
          value: "production"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: betterblood-secrets
              key: db-host
        - name: DB_NAME
          value: "betterblood"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: betterblood-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: betterblood-secrets
              key: db-password
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: betterblood-secrets
              key: redis-host
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: food-service
  namespace: betterblood
spec:
  selector:
    app: food-service
  ports:
  - port: 3004
    targetPort: 3004
    name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: betterblood
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cgm-service-hpa
  namespace: betterblood
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cgm-service
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: food-service-hpa
  namespace: betterblood
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: food-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70