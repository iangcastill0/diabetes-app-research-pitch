apiVersion: v1
kind: ConfigMap
metadata:
  name: betterblood-config
  namespace: betterblood
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  JWT_ALGORITHM: "RS256"
  JWT_EXPIRES_IN: "900"
  JWT_REFRESH_EXPIRES_IN: "604800"
  CGM_WEBSOCKET_PATH: "/cgm/stream"
  
  # Service configuration
  AUTH_SERVICE_PORT: "3000"
  CGM_SERVICE_PORT: "3002"
  WEBSOCKET_SERVICE_PORT: "3003"
  FOOD_SERVICE_PORT: "3004"
  
  # Rate limiting
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  
  # CGM settings
  CGM_READING_INTERVAL_SECONDS: "300"
  CGM_HISTORY_HOURS_DEFAULT: "24"