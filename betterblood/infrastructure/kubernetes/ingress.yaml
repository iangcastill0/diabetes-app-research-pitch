apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: betterblood-ingress
  namespace: betterblood
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: ${SSL_CERTIFICATE_ARN}
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
spec:
  rules:
  - host: api.betterblood.io
    http:
      paths:
      - path: /api/v1/auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 3000
      - path: /api/v1/cgm
        pathType: Prefix
        backend:
          service:
            name: cgm-service
            port:
              number: 3002
      - path: /api/v1/food
        pathType: Prefix
        backend:
          service:
            name: food-service
            port:
              number: 3004
      - path: /health
        pathType: Exact
        backend:
          service:
            name: auth-service
            port:
              number: 3000