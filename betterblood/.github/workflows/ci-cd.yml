name: Build and Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

    - name: Run TypeScript check
      run: npm run typecheck

    - name: Run unit tests
      run: npm run test:ci

    - name: Generate coverage report
      run: npm run test:coverage

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        directory: ./coverage

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    strategy:
      matrix:
        service: [auth-service, cgm-service, food-service]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: ./services/${{ matrix.service }}
        push: true
        tags: |
          ${{ env.ECR_REGISTRY }}/betterblood/${{ matrix.service }}:${{ github.sha }}
          ${{ env.ECR_REGISTRY }}/betterblood/${{ matrix.service }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
        target: production

  security-scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  deploy-staging:
    needs: [build-and-push, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name betterblood-staging --region ${{ env.AWS_REGION }}

    - name: Deploy to staging
      run: |
        cd infrastructure/kubernetes
        kustomize build overlays/staging | kubectl apply -f -
        kubectl set image deployment/auth-service auth-service=${{ env.ECR_REGISTRY }}/betterblood/auth-service:${{ github.sha }} -n betterblood
        kubectl set image deployment/cgm-service cgm-service=${{ env.ECR_REGISTRY }}/betterblood/cgm-service:${{ github.sha }} -n betterblood
        kubectl set image deployment/food-service food-service=${{ env.ECR_REGISTRY }}/betterblood/food-service:${{ github.sha }} -n betterblood
        kubectl rollout status deployment/auth-service -n betterblood
        kubectl rollout status deployment/cgm-service -n betterblood
        kubectl rollout status deployment/food-service -n betterblood

  deploy-production:
    needs: [build-and-push, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name betterblood-production --region ${{ env.AWS_REGION }}

    - name: Deploy to production
      run: |
        cd infrastructure/kubernetes
        kustomize build overlays/production | kubectl apply -f -
        kubectl set image deployment/auth-service auth-service=${{ env.ECR_REGISTRY }}/betterblood/auth-service:${{ github.sha }} -n betterblood
        kubectl set image deployment/cgm-service cgm-service=${{ env.ECR_REGISTRY }}/betterblood/cgm-service:${{ github.sha }} -n betterblood
        kubectl set image deployment/food-service food-service=${{ env.ECR_REGISTRY }}/betterblood/food-service:${{ github.sha }} -n betterblood
        kubectl rollout status deployment/auth-service -n betterblood
        kubectl rollout status deployment/cgm-service -n betterblood
        kubectl rollout status deployment/food-service -n betterblood